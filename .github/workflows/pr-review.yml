name: 🤖 AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/review'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: action_requirements.txt

      - name: Install dependencies
        run: pip install -r action_requirements.txt

      - name: Run AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FREE_MODEL_CHAIN: ${{ vars.FREE_MODEL_CHAIN || 'qwen/qwen3-235b-a22b:free,google/gemma-3-27b-it:free,mistralai/mistral-7b-instruct:free' }}
        run: python scripts/action_review.py

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-logs
          path: "*.log"
          retention-days: 7
