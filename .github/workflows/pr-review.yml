name: PR Review

# SECURITY: this trigger is intentionally `pull_request`, NEVER
# `pull_request_target`. `pull_request_target` runs in the context of the BASE
# repo with read/write secrets while checking out UNTRUSTED fork code — the
# classic "pwn-request" privilege-escalation hole. Because this agent only ever
# READS the diff through the GitHub API (it never checks out or executes PR
# code), plain `pull_request` is correct and safe. For pushes from forks the
# automatic GITHUB_TOKEN is read-only and OPENROUTER_API_KEY is not exposed, so
# the inline review is skipped; fork PRs are reviewed via the `/review` command
# workflow (pr-review-command.yml), which still never runs fork code.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least privilege: read the repo/diff, write PR review comments. Nothing else.
permissions:
  contents: read
  pull-requests: write

# One review per PR head at a time; cancel superseded runs on new pushes.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review diff
    runs-on: ubuntu-latest
    # Skip draft PRs until they are marked ready for review.
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      # Checks out the BASE repo only (the action code). We never check out or
      # execute the PR head; the diff is fetched via the GitHub API.
      - name: Checkout action
        uses: actions/checkout@v4

      - name: Run review agent
        uses: ./
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
